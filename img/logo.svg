<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="triGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2BC4D6"/>
      <stop offset="1" stop-color="#1577B3"/>
    </linearGradient>
  </defs>

  <!-- Rounded triangle (apex y=6, base y=56.8 → centroid y≈39.9) -->
  <path fill="url(#triGrad)"
        d="M32 6
           C 30 6, 28.5 7, 27.6 8.6
           L 5.6 49.2
           C 4.7 50.8, 4.7 52.7, 5.6 54.3
           C 6.5 55.9, 8.1 56.8, 10 56.8
           L 54 56.8
           C 55.9 56.8, 57.5 55.9, 58.4 54.3
           C 59.3 52.7, 59.3 50.8, 58.4 49.2
           L 36.4 8.6
           C 35.5 7, 34 6, 32 6 Z"/>

  <!-- Propeller centered on triangle centroid (32, 40) -->
  <g fill="#FFFFFF">
    <ellipse cx="32" cy="30.5" rx="2.6" ry="9.5"/>
    <ellipse cx="32" cy="30.5" rx="2.6" ry="9.5" transform="rotate(120 32 40)"/>
    <ellipse cx="32" cy="30.5" rx="2.6" ry="9.5" transform="rotate(240 32 40)"/>
    <circle cx="32" cy="40" r="2.8"/>
  </g>

  <!-- Voice waves flanking the propeller hub -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="1.6">
    <path d="M23 31 Q 21 34 23 37" opacity="0.95"/>
    <path d="M20 28 Q 16 34 20 40" opacity="0.55"/>
    <path d="M41 31 Q 43 34 41 37" opacity="0.95"/>
    <path d="M44 28 Q 48 34 44 40" opacity="0.55"/>
  </g>
</svg>
